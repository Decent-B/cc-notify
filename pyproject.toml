[build-system]
requires = ["setuptools>=65"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "cc-notify"
version = "0.1.0"
description = "Windows tray app that sends native notifications for Claude Code events"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = [
    "flask>=3.0",
    "waitress>=3.0",
    "win11toast>=0.36",
    "pystray>=0.19",
    "pillow>=10.0",
]

[project.urls]
Homepage   = "https://github.com/Decent-Cypher/ai-notification"
Repository = "https://github.com/Decent-Cypher/ai-notification"
Issues     = "https://github.com/Decent-Cypher/ai-notification/issues"

[project.scripts]
cc-notify = "main:main"

[tool.setuptools.packages.find]
where = ["src"]
