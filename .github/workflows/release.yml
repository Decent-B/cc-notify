name: Build and Release

# Triggers on a version tag push (e.g. git tag v0.2.0 && git push --tags)
# or via manual workflow dispatch from the Actions tab.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # Required to create GitHub Releases and upload assets.

jobs:
  build:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── uv setup (manages both Python and the virtual environment) ──────────
      - name: Install uv
        # Pin to the full semver tag — astral-sh/setup-uv has not yet published
        # a floating v8 major-version tag (only v8.0.0 / v8.1.0 / v8.2.0 exist).
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true

      # --no-install-project: cc-notify is a PyInstaller app, not a pip package.
      # Install only the declared dependencies; never try to build the project itself.
      - name: Install dependencies
        run: uv sync --group dev --no-install-project

      # ── Generate icon ───────────────────────────────────────────────────────
      - name: Generate icon.ico
        run: uv run python scripts/create_icon.py

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build executable with PyInstaller
        run: uv run pyinstaller build.spec

      # ── Rename artifact with version ────────────────────────────────────────
      - name: Rename artifact
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"   # e.g. v0.2.0
          $version = $tag.TrimStart("v")         # e.g. 0.2.0
          Rename-Item "dist\cc-notify.exe" "cc-notify-$version-windows-x64.exe"
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── Checksum ─────────────────────────────────────────────────────────────
      - name: Compute SHA-256 checksum
        shell: pwsh
        run: |
          $file = "dist\cc-notify-${{ env.VERSION }}-windows-x64.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash
          "cc-notify-${{ env.VERSION }}-windows-x64.exe  $hash" |
            Out-File "dist\SHA256SUMS.txt" -Encoding UTF8
          Write-Host "SHA256: $hash"

      # ── Upload artifacts for inspection before release ─────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cc-notify-${{ env.VERSION }}-windows-x64
          path: |
            dist/cc-notify-${{ env.VERSION }}-windows-x64.exe
            dist/SHA256SUMS.txt

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "cc-notify ${{ github.ref_name }}"
          body: |
            ## Installation

            **1. Download** `cc-notify-${{ env.VERSION }}-windows-x64.exe` from the assets below.

            > **SmartScreen warning?** Click **"More info"** → **"Run anyway"**. This is expected
            > for open-source apps without an EV code-signing certificate — the source is fully
            > auditable here on GitHub.

            **2. Run it** — double-click the EXE. A purple bell icon appears in your system tray.

            **3. Configure Claude Code hooks:**

            **Option A — tray icon (recommended)**

            Right-click the purple bell in your system tray and choose **"Setup Claude Code Hooks…"**:

            ![cc-notify tray menu](https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/assets/tray-menu.png)

            cc-notify auto-detects whether Claude Code is installed natively on Windows, inside WSL2,
            or both, and configures each environment automatically.

            **Option B — command line**

            *Windows (Claude Code native):*
            ```powershell
            .\scripts\setup-hooks.ps1
            ```

            *WSL2 (Claude Code running inside WSL2):*
            ```bash
            bash scripts/setup-hooks.sh
            ```

            **4. Restart Claude Code** for the hook changes to take effect.

            ---

            ## Checksums
            See `SHA256SUMS.txt` attached below.
          files: |
            dist/cc-notify-${{ env.VERSION }}-windows-x64.exe
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
